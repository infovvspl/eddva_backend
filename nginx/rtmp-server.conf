# ─── nginx-rtmp LIVE STREAMING SERVER ─────────────────────────────────────────
#
# Deploy this file to the STREAMING server (43.204.136.13 — nginx-rtmp).
# The NestJS backend runs on a SEPARATE App server.
#
# Install on Ubuntu/Debian (streaming server):
#   apt install nginx libnginx-mod-rtmp
#   cp rtmp-server.conf /etc/nginx/nginx.conf
#   nginx -t && nginx -s reload
#
# On the APP server, update .env.prod:
#   LIVE_CDN_BASE_URL=http://<STREAMING_SERVER_PRIVATE_IP>:8080/hls
# NestJS fetches HLS segments from the streaming server over the internal
# network (~1ms) instead of uploading to R2 and back (~5-8s).
#
# Also open port 8080 on the streaming server's security group:
#   Inbound TCP 8080 — source: App server security group (or private IP /32)
#
# Replace 43.204.136.13 below with your App server's private IP or hostname.
#
# KEY LATENCY CHANGES vs defaults:
#   hls_fragment   5s → 1s   (base buffer shrinks 4x)
#   hls_playlist_length 30s → 4s  (playlist keeps only 4 segments)
#   liveSyncDurationCount 3 → 2   (hls.js buffers 2 segments instead of 3)
#
# Target latency: 3–5 s  (was 20–25 s)
# ──────────────────────────────────────────────────────────────────────────────

load_module modules/ngx_rtmp_module.so;

worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

# ─── RTMP ingest ──────────────────────────────────────────────────────────────
rtmp {
    server {
        listen 1935;
        chunk_size 4096;
        # Drop publishers that are idle > 30 s (prevents zombie streams)
        timeout 30s;

        application live {
            live on;
            # Deny pull-play — only push is allowed
            deny play all;

            # ── HLS output ────────────────────────────────────────────────────
            hls on;
            hls_path /var/www/hls;

            # 1-second fragments → each segment is 1 s long.
            # Keep exactly 4 fragments in the playlist (= ~4 s of buffer).
            hls_fragment     1s;
            hls_playlist_length 4s;

            # Disable continuous fragmentation so each keyframe starts a new segment.
            # Matches OBS keyframe interval = 1 s (see teacher OBS instructions).
            hls_sync 100ms;

            # ── Stream-key validation via NestJS ──────────────────────────────
            # nginx-rtmp POSTs form data: app=live&name={streamKey}&addr={ip}...
            # The NestJS endpoint reads X-Rtmp-Secret header (added by the HTTP
            # location proxy below) and returns 2xx to allow or 4xx to deny.
            on_publish      http://127.0.0.1:3001/internal/rtmp/validate;
            on_publish_done http://127.0.0.1:3001/internal/rtmp/ended;

            # Record finished streams for VOD (optional — disable if not needed)
            # record off;
        }
    }
}

http {
    include      /etc/nginx/mime.types;
    default_type application/octet-stream;
    sendfile     on;
    tcp_nopush   on;
    tcp_nodelay  on;
    keepalive_timeout 65;

    log_format main '$remote_addr - $remote_method $request_uri $status';
    access_log /var/log/nginx/rtmp-access.log main;

    # ─── HLS static file server (port 8080) ───────────────────────────────────
    # NestJS fetches from http://localhost:8080/hls/{streamKey}/{file}
    # The URL has a streamKey path segment that we strip — files live flat in
    # /var/www/hls/ as {streamKey}-NNN.ts and {streamKey}.m3u8.
    server {
        listen 8080;
        server_name localhost;

        # Health check
        location = /healthz { return 200 'ok'; }

        # nginx-rtmp writes files flat: {streamKey}.m3u8 and {streamKey}-NNN.ts
        # Frontend requests /hls/{streamKey}/index.m3u8 — map to {streamKey}.m3u8
        location ~ ^/hls/([a-f0-9]+)/index\.m3u8$ {
            alias /var/www/hls/$1.m3u8;
            add_header Cache-Control "no-cache, no-store" always;
            add_header Access-Control-Allow-Origin "*" always;
            add_header Access-Control-Allow-Headers "Range" always;
            add_header Access-Control-Expose-Headers "Content-Length, Content-Range" always;
        }

        location ~ ^/hls/[a-f0-9]+/(.+\.ts)$ {
            alias /var/www/hls/$1;
            add_header Cache-Control "public, max-age=10" always;
            add_header Access-Control-Allow-Origin "*" always;
            add_header Access-Control-Allow-Headers "Range" always;
            add_header Access-Control-Expose-Headers "Content-Length, Content-Range" always;
        }
    }

    # ─── Internal RTMP callback proxy (injects X-Rtmp-Secret header) ──────────
    # The RTMP module calls these internal locations; nginx rewrites them to the
    # NestJS endpoints with the secret header attached, so the secret never
    # appears in the RTMP access log.
    #
    # Set the RTMP_SECRET variable below to match your .env RTMP_SECRET value.
    server {
        listen 127.0.0.1:3001;
        server_name localhost;

        # IMPORTANT: replace the value below with your actual RTMP_SECRET
        set $rtmp_secret "edva_rtmp_secret_2026";

        location /internal/rtmp/validate {
            # !! Replace 43.204.136.13 with your App server's private IP !!
            proxy_pass http://43.204.136.13:3000/api/v1/school/live/stream/validate;
            proxy_set_header X-Rtmp-Secret $rtmp_secret;
            proxy_set_header Content-Type "application/x-www-form-urlencoded";
            proxy_pass_request_body on;
        }

        location /internal/rtmp/ended {
            # !! Replace 43.204.136.13 with your App server's private IP !!
            proxy_pass http://43.204.136.13:3000/api/v1/school/live/stream/ended;
            proxy_set_header X-Rtmp-Secret $rtmp_secret;
            proxy_set_header Content-Type "application/x-www-form-urlencoded";
            proxy_pass_request_body on;
        }
    }
}
