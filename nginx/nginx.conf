# ── APEXIQ Nginx Config ───────────────────────────────────────────────────────
# Proxies all traffic to the NestJS backend container.
# AI service is internal-only (backend ↔ ai-service via Docker network).
#
# Before enabling HTTPS section: run certbot to obtain SSL certificates.
# See DEPLOYMENT.md §6 for instructions.

upstream backend {
    server backend:3000;
    keepalive 32;
}

# ── HTTP ──────────────────────────────────────────────────────────────────────
server {
    listen 80;
    server_name dev-api.eddva.in api.eddva.in _;

    # Certbot ACME challenge (needed for cert issuance)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    include /etc/nginx/conf.d/proxy_params.conf;

    location / {
        # Pass ALL requests (including OPTIONS preflight) to NestJS.
        # NestJS handles CORS headers — nginx must NOT intercept OPTIONS.
        proxy_pass http://backend;
    }
}

# ── HTTPS ─────────────────────────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    server_name dev-api.eddva.in api.eddva.in;

    ssl_certificate     /etc/letsencrypt/live/dev-api.eddva.in/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/dev-api.eddva.in/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;

    include /etc/nginx/conf.d/proxy_params.conf;

    location / {
        # Pass ALL requests (including OPTIONS preflight) to NestJS.
        # NestJS handles CORS headers — nginx must NOT intercept OPTIONS.
        proxy_pass http://backend;
    }
}
