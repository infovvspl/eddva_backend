# ============================================================
# nginx-rtmp config for streaming server (13.127.31.213)
# Place at: /etc/nginx/nginx.conf  (or include from it)
# Reload:   sudo nginx -t && sudo systemctl reload nginx
# ============================================================

worker_processes auto;
events { worker_connections 1024; }

# ── RTMP ingest (OBS → server) ──────────────────────────────────────────────
rtmp {
  server {
    listen 1935;
    chunk_size 4096;

    # Primary full-quality stream (720p or whatever OBS sends)
    application live {
      live on;
      record off;

      # HLS output — tuned for low-latency + slow-internet resilience
      hls on;
      hls_path /var/www/hls;
      hls_fragment 2s;           # 2s chunks (was 1s) — halves HTTP request rate
      hls_playlist_length 12s;   # keep 6 segments buffered (was 4s)
      hls_continuous on;         # don't reset segment numbers on reconnect
      hls_cleanup on;            # auto-delete old segments

      # Notify app server when stream starts / ends
      on_publish http://127.0.0.1:3001/api/v1/stream/on-publish;
      on_publish_done http://127.0.0.1:3001/api/v1/stream/on-publish-done;

      # Push to ABR transcoding applications
      exec_push ffmpeg -i rtmp://localhost/live/$name
        -c:v libx264 -b:v 800k  -s 854x480  -c:a aac -b:a 96k  -f flv rtmp://localhost/live_480p/$name
        -c:v libx264 -b:v 400k  -s 640x360  -c:a aac -b:a 64k  -f flv rtmp://localhost/live_360p/$name
        2>>/var/log/nginx/ffmpeg-transcode.log;
    }

    # 480p transcoded stream
    application live_480p {
      live on;
      record off;
      hls on;
      hls_path /var/www/hls480;
      hls_fragment 2s;
      hls_playlist_length 12s;
      hls_continuous on;
      hls_cleanup on;
    }

    # 360p transcoded stream (for slow internet)
    application live_360p {
      live on;
      record off;
      hls on;
      hls_path /var/www/hls360;
      hls_fragment 2s;
      hls_playlist_length 12s;
      hls_continuous on;
      hls_cleanup on;
    }
  }
}

# ── HTTP — serve HLS to clients ─────────────────────────────────────────────
http {
  include      mime.types;
  default_type application/octet-stream;
  sendfile     on;

  server {
    listen 8080;
    server_name _;

    # Security: only the app server should call the webhook paths
    location ~ ^/api/ {
      allow 127.0.0.1;
      deny  all;
    }

    # HLS segments — full quality
    location /hls {
      root /var/www;
      add_header 'Access-Control-Allow-Origin'  '*'          always;
      add_header 'Access-Control-Allow-Headers' 'Range'      always;
      add_header 'Access-Control-Expose-Headers' 'Content-Length,Content-Range' always;

      # Playlists must never be stale; segments are immutable once written
      location ~* \.m3u8$ {
        add_header 'Cache-Control' 'no-cache, no-store' always;
        add_header 'Access-Control-Allow-Origin' '*' always;
      }
      location ~* \.ts$ {
        add_header 'Cache-Control' 'public, max-age=30' always;
        add_header 'Access-Control-Allow-Origin' '*' always;
      }

      types {
        application/vnd.apple.mpegurl m3u8;
        video/mp2t                    ts;
      }
    }

    # 480p HLS
    location /hls480 {
      root /var/www;
      add_header 'Access-Control-Allow-Origin' '*' always;
      location ~* \.m3u8$ { add_header 'Cache-Control' 'no-cache, no-store' always; }
      location ~* \.ts$    { add_header 'Cache-Control' 'public, max-age=30'  always; }
      types {
        application/vnd.apple.mpegurl m3u8;
        video/mp2t                    ts;
      }
    }

    # 360p HLS
    location /hls360 {
      root /var/www;
      add_header 'Access-Control-Allow-Origin' '*' always;
      location ~* \.m3u8$ { add_header 'Cache-Control' 'no-cache, no-store' always; }
      location ~* \.ts$    { add_header 'Cache-Control' 'public, max-age=30'  always; }
      types {
        application/vnd.apple.mpegurl m3u8;
        video/mp2t                    ts;
      }
    }
  }
}
