name: Deploy Backend to EC2

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Deploy NestJS Backend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Get runner IP and open EC2 security group
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ${{ secrets.AWS_REGION }}
        run: |
          RUNNER_IP=$(curl -s https://checkip.amazonaws.com)
          echo "RUNNER_IP=$RUNNER_IP" >> $GITHUB_ENV
          aws ec2 authorize-security-group-ingress \
            --group-id ${{ secrets.EC2_SG_ID }} \
            --protocol tcp \
            --port 22 \
            --cidr "${RUNNER_IP}/32" \
            --description "GitHub Actions runner (auto-removed)" || true

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          command_timeout: 10m
          script: |
            set -e
            cd /home/ubuntu/eddva_backend

            echo "Pulling latest code..."
            git stash || true
            git pull origin main

            echo "Ensuring .env is present..."
            if [ ! -f .env ] || [ ! -s .env ]; then
              cp ~/eddva_backend_dev/.env .env
              echo ".env restored from dev"
            fi
            sed -i 's/^PORT=.*/PORT=3000/' .env
            grep -q '^PORT=' .env || echo 'PORT=3000' >> .env

            echo "Installing dependencies..."
            npm ci --production=false

            echo "Building TypeScript..."
            npm run build

            echo "Running migrations..."
            npm run migration:run || echo "No pending migrations"

            echo "Restarting PM2 with updated env..."
            mkdir -p /home/ubuntu/logs
            pm2 restart ecosystem.config.js --env production --update-env || pm2 start ecosystem.config.js --env production

            echo "Waiting for app to boot..."
            sleep 12

            echo "Health check..."
            curl -sf http://localhost:3000/api/v1/tenants/public/platform-config?vertical=coaching \
              -o /dev/null && echo "✅ Health check passed" \
              || (pm2 logs eddva-backend --lines 20 --nostream && exit 1)

            echo "Backend deployed successfully at $(date)"
            pm2 status

      - name: Remove runner IP from EC2 security group
        if: always()
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ${{ secrets.AWS_REGION }}
        run: |
          aws ec2 revoke-security-group-ingress \
            --group-id ${{ secrets.EC2_SG_ID }} \
            --protocol tcp \
            --port 22 \
            --cidr "${RUNNER_IP}/32" || true
