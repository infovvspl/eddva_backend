name: Deploy Backend (DEV)

on:
  push:
    branches: [dev]

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install & Build
        run: |
          npm ci
          npm run build

      - name: Get runner IP and open EC2 security group
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ${{ secrets.AWS_REGION }}
        run: |
          RUNNER_IP=$(curl -s https://checkip.amazonaws.com)
          echo "RUNNER_IP=$RUNNER_IP" >> $GITHUB_ENV
          aws ec2 authorize-security-group-ingress \
            --group-id ${{ secrets.EC2_SG_ID }} \
            --protocol tcp \
            --port 22 \
            --cidr "${RUNNER_IP}/32" \
            --description "GitHub Actions runner (auto-removed)" || true

      - name: Deploy to EC2 (DEV)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          envs: SCHOOL_JWT_SECRET
          script: |
            set -e
            cd /home/ubuntu/eddva_backend_dev
            git fetch --all
            git reset --hard origin/dev
            npm ci
            npm run build
            grep -q '^SCHOOL_JWT_SECRET=' .env \
              && sed -i "s|^SCHOOL_JWT_SECRET=.*|SCHOOL_JWT_SECRET=${SCHOOL_JWT_SECRET}|" .env \
              || echo "SCHOOL_JWT_SECRET=${SCHOOL_JWT_SECRET}" >> .env
            grep -q '^INTERNAL_API_KEY=' .env \
              && sed -i 's|^INTERNAL_API_KEY=.*|INTERNAL_API_KEY=edva_internal_ai_log_2026|' .env \
              || echo 'INTERNAL_API_KEY=edva_internal_ai_log_2026' >> .env
            if pm2 list | grep -q eddva-backend-dev; then
              pm2 restart eddva-backend-dev --update-env
            else
              mkdir -p /home/ubuntu/logs
              pm2 start dist/main.js \
                --name eddva-backend-dev \
                -i 1 \
                --max-memory-restart 400M \
                --log /home/ubuntu/logs/backend-dev.log
            fi
            pm2 save

      - name: Remove runner IP from EC2 security group
        if: always()
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ${{ secrets.AWS_REGION }}
        run: |
          aws ec2 revoke-security-group-ingress \
            --group-id ${{ secrets.EC2_SG_ID }} \
            --protocol tcp \
            --port 22 \
            --cidr "${RUNNER_IP}/32" || true

      - name: Notify success
        if: success()
        run: echo "DEV Backend deployed to dev-api.eddva.in (port 3001)"
